<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Color Strike - Support</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif;
            background: #0a0a0a;
            color: #fff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
        }
        .container { max-width: 500px; width: 100%; }
        h1 {
            font-size: 28px;
            font-weight: 800;
            text-align: center;
            margin-bottom: 8px;
            background: linear-gradient(135deg, #ff6b6b, #ffd93d, #6bff6b, #6bb5ff, #d66bff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .subtitle {
            text-align: center;
            color: #888;
            font-size: 14px;
            margin-bottom: 32px;
        }
        .card {
            background: #1a1a1a;
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 16px;
            border: 1px solid #2a2a2a;
        }
        label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            color: #ccc;
            margin-bottom: 8px;
        }
        select, textarea, input[type="email"] {
            width: 100%;
            background: #111;
            border: 1px solid #333;
            border-radius: 10px;
            padding: 12px;
            color: #fff;
            font-size: 16px;
            font-family: inherit;
            outline: none;
            transition: border-color 0.2s;
        }
        select:focus, textarea:focus, input:focus {
            border-color: #6bb5ff;
        }
        textarea { min-height: 120px; resize: vertical; }
        select { margin-bottom: 16px; }
        .email-note {
            font-size: 12px;
            color: #666;
            margin-top: 4px;
        }
        button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #6b6bff, #6bb5ff);
            border: none;
            border-radius: 12px;
            color: #fff;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            margin-top: 16px;
            transition: opacity 0.2s;
        }
        button:hover { opacity: 0.9; }
        button:disabled { opacity: 0.5; cursor: not-allowed; }
        .success {
            text-align: center;
            padding: 40px 20px;
        }
        .success .check {
            font-size: 48px;
            margin-bottom: 16px;
        }
        .success h2 { margin-bottom: 8px; }
        .success p { color: #888; }
        .hidden { display: none; }
        .footer {
            margin-top: 40px;
            text-align: center;
            color: #444;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>⚔️ Color Strike</h1>
        <p class="subtitle">Support & Feedback</p>

        <div id="form-view">
            <div class="card">
                <label for="type">What's this about?</label>
                <select id="type">
                    <option value="bug">🐛 Bug Report</option>
                    <option value="feedback">💡 Feedback / Suggestion</option>
                    <option value="question">❓ Question</option>
                    <option value="other">📝 Other</option>
                </select>

                <label for="message">Tell us more</label>
                <textarea id="message" placeholder="Describe what happened, what you'd like to see, or anything else..."></textarea>

                <label for="email" style="margin-top: 16px;">Email (optional)</label>
                <input type="email" id="email" placeholder="your@email.com">
                <p class="email-note">Only if you'd like us to follow up with you</p>

                <button id="submit-btn" onclick="submitFeedback()">Send Feedback</button>
            </div>
        </div>

        <div id="success-view" class="hidden">
            <div class="card success">
                <div class="check">✅</div>
                <h2>Thanks!</h2>
                <p>Your feedback has been received. We appreciate you helping make Color Strike better.</p>
            </div>
        </div>

        <p class="footer">© 2026 Color Strike</p>
    </div>

    <script>
        async function submitFeedback() {
            const btn = document.getElementById('submit-btn');
            const type = document.getElementById('type').value;
            const message = document.getElementById('message').value.trim();
            const email = document.getElementById('email').value.trim();

            if (!message) {
                alert('Please enter a message');
                return;
            }

            btn.disabled = true;
            btn.textContent = 'Sending...';

            try {
                const resp = await fetch('/api/feedback', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ type, message, email })
                });

                if (resp.ok) {
                    document.getElementById('form-view').classList.add('hidden');
                    document.getElementById('success-view').classList.remove('hidden');
                } else {
                    throw new Error('Failed');
                }
            } catch (e) {
                alert('Something went wrong. Please try again.');
                btn.disabled = false;
                btn.textContent = 'Send Feedback';
            }
        }
    </script>
</body>
</html>
